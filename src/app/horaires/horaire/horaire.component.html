<div class="d-flex justify-content-center" *ngIf="isLoadingView">
    <mat-spinner color="warn" [diameter]="30"></mat-spinner> <p class="ml-2"> Patientez-svp...</p>
</div>
<mat-card class="mb-25 tagus-card" *ngIf="!isLoadingView && horaire">
    <mat-card-header>
        <h4 class="mb-0">{{ horaire.name_horaire.toLocaleUpperCase() }}</h4>
        <span *ngIf="currentUser">
            <button mat-icon-button color="accent" 
             (click)="edit(horaire.id)"
                *ngIf="currentUser.permission === 'U' || 
                currentUser.permission === 'RU' ||
                currentUser.permission === 'CRU' ||
                currentUser.permission === 'RUD' ||
                currentUser.permission === 'CRUD'" 
                matTooltip="Modifier l'horaire"
                class="mat-icon">
                    <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" 
                    (click)="delete(horaire.id)"
                *ngIf="currentUser.permission === 'D' || 
                    currentUser.permission === 'RD' ||
                    currentUser.permission === 'RUD' || 
                    currentUser.permission === 'CRUD'" 
                    matTooltip="Supprimer cette horaire"
                    class="mat-icon">
                <mat-icon>delete</mat-icon>
            </button>
        </span>
    </mat-card-header>
    <mat-card-content> 
        <!-- <full-calendar [options]="calendarOptions"></full-calendar>  -->
       
        <div class="row">
            <div class="col-lg-6 col-md-6 col-sm-6">
                <div class="d-md-flex align-items-center justify-content-space-between">
                    <h6>SHIFT 1</h6>
                    <button mat-icon-button color="primary" 
                        (click)="openEditDialog('300ms', '100ms', horaire.personnel_shift_1, 1, horaire.time_1)">
                        <mat-icon>group</mat-icon>
                    </button>
                </div>
                <div class="tagus-form-group">
                    <mat-calendar [dateClass]="dateClass" [matTooltip]="horaire.time_1"></mat-calendar>
                </div>
            </div>
            <div class="col-lg-6 col-md-6 col-sm-6">
                <div class="d-md-flex align-items-center justify-content-space-between">
                    <h6>SHIFT 2</h6>
                    <button mat-icon-button color="primary" 
                        (click)="openEditDialog('300ms', '100ms', horaire.personnel_shift_2, 2, horaire.time_2)">
                        <mat-icon>group</mat-icon>
                    </button>
                </div> 
                <div class="tagus-form-group">
                    <mat-calendar [dateClass]="dateClass2" [matTooltip]="horaire.time_2"></mat-calendar>
                </div> 
            </div>
            <div class="col-lg-6 col-md-6 col-sm-6">
                <div class="d-md-flex align-items-center justify-content-space-between">
                    <h6 class="pt-25">SHIFT 3</h6>
                    <button mat-icon-button color="primary" 
                        (click)="openEditDialog('300ms', '100ms', horaire.personnel_shift_3, 3, horaire.time_3)">
                        <mat-icon>group</mat-icon>
                    </button>
                </div>
                <div class="tagus-form-group">
                    <mat-calendar [dateClass]="dateClass3" [matTooltip]="horaire.time_3"></mat-calendar>
                </div>
            </div>
        </div>
    </mat-card-content>
</mat-card>
