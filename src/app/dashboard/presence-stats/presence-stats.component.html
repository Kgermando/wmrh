<mat-card class="mb-25 tagus-card">
    <mat-card-header class="border-bottom">
        <h5 class="mb-0">Presence</h5>
        <button type="button" mat-button class="position-relative btn bg-transparent border-none" [matMenuTriggerFor]="monthMenu">
            Cette semaine
        </button>
        <mat-menu #monthMenu="matMenu" class="monthMenu" xPosition="before"> 
            <button mat-menu-item type="button" class="bg-transparent border-none">Ce mois</button>
            <button mat-menu-item type="button" class="bg-transparent border-none">Cette année</button> 
        </mat-menu>
    </mat-card-header>
    <mat-card-content>
        <div class="chart audienceOverviewChart">
            <apx-chart
                [series]="chartOptions.series!"
                [chart]="chartOptions.chart!"
                [xaxis]="chartOptions.xaxis!"
                [yaxis]="chartOptions.yaxis!"
                [stroke]="chartOptions.stroke!"
                [tooltip]="chartOptions.tooltip!"
                [dataLabels]="chartOptions.dataLabels!"
                [legend]="chartOptions.legend!"
                [grid]="chartOptions.grid!"
                [colors]="chartOptions.colors!"
            ></apx-chart>
        </div>
    </mat-card-content>
</mat-card>
